name: UI Builder Theme
type: theme
description: 'A minimal front-end starter theme for the UI Builder module. Note: This theme is designed strictly for the front-end and should not be set as the Administration theme.'
core_version_requirement: ^9 || ^10 || ^11
base theme: false

libraries:
  - ui_builder_theme/global-styling

regions:
  header: 'Header'
  primary_menu: 'Primary Menu'
  secondary_menu: 'Secondary Menu'
  breadcrumb: 'Breadcrumb'
  highlighted: 'Highlighted (Messages)'
  content: 'Main Content'
  sidebar: 'Sidebar'
  footer: 'Footer'
  page_top: 'Page top'
  page_bottom: 'Page bottom'
